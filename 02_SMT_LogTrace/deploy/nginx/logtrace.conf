upstream smt_logtrace_gateway {
    server 127.0.0.1:8081;
    keepalive 32;
}

server {
    listen 8444 ssl;
    server_name _;

    ssl_certificate /etc/smt-logtrace/tls/server.crt;
    ssl_certificate_key /etc/smt-logtrace/tls/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SMTLogTrace:10m;

    client_max_body_size 1m;
    client_body_timeout 10s;
    proxy_connect_timeout 3s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://smt_logtrace_gateway;
    }
}
